# Zigbee Smart Water Valve — Dashboard Card
# v0.3.0
# Repository: https://github.com/rhamblen/Zigbee-smart-water-valve
# Requires: custom:html-template-card (HACS)
#
# ENTITY PREFIX
# Find-and-replace ALL occurrences of "tap_lhs_lower_lawn_green" with your actual prefix.
# Also update the helper entity IDs for volume/daily/monthly sensors.
#
# HELPERS REQUIRED (Phase 2 — consumption):
#   sensor.tap_{prefix}_flow_l_h         — template sensor (m³/h → L/h)
#   sensor.tap_{prefix}_volume           — integration (Riemann sum, L)
#   sensor.tap_{prefix}_daily            — utility meter daily (L)
#   sensor.tap_{prefix}_monthly          — utility meter monthly (L)
#
# HELPERS REQUIRED (Phase 3 — timer):
#   timer.tap_{prefix}_timer             — HA timer helper (restore: true)
#   automation: closes valve on timer.finished event
#
# For this card instance (LHS Lower Lawn Green):
#   timer.tap_lhs_lower_lawn_green_timer
#   sensor.tap_lhs_lower_lawn_green_daily
#   sensor.tap_lhs_lower_lawn_green_monthly
#
# Entities used:
#   switch.{prefix}        — valve open/close control
#   sensor.{prefix}_flow   — volume flow rate (m³/h, displayed as L/min)

type: custom:html-template-card
ignore_line_breaks: true
content: >-
  {% set valve     = states('switch.tap_lhs_lower_lawn_green') %}
  {% set flow_m3h  = states('sensor.tap_lhs_lower_lawn_green_flow')|float(0) %}
  {% set flow_lmin = (flow_m3h * 1000 / 60)|round(1) %}
  {% set valve_open   = valve == 'on' %}
  {% set is_flowing   = flow_m3h > 0 %}
  {% set unavailable  = valve in ['unknown','unavailable'] %}
  {% set name = state_attr('switch.tap_lhs_lower_lawn_green','friendly_name')|default('Tap Valve',true) %}
  {% set dial_class = 'zwv-dunavail' if unavailable else 'zwv-dclosed' if not valve_open else 'zwv-dopen' + (' zwv-flowing' if is_flowing else '') %}
  {% set val_class  = 'zwv-fvclosed' if (not valve_open or unavailable) else 'zwv-fvopen' %}
  {% set lbl_class  = 'zwv-fsunavail' if unavailable else 'zwv-fsoff' if not valve_open else 'zwv-fson' %}
  {% set flow_disp  = '?' if unavailable else '—' if not valve_open else flow_lmin %}
  {% set flow_lbl   = 'UNAVAILABLE' if unavailable else 'CLOSED' if not valve_open else 'FLOWING' if is_flowing else 'OPEN' %}
  {% set last_changed_ts = as_timestamp(states.switch.tap_lhs_lower_lawn_green.last_changed)|int(0) %}
  {% set elapsed_secs = ((now()|as_timestamp) - last_changed_ts)|int if valve_open else 0 %}
  {% set elapsed_h = elapsed_secs // 3600 %}
  {% set elapsed_m = (elapsed_secs % 3600) // 60 %}
  {% set elapsed_fmt = (elapsed_h|string + 'h ' if elapsed_h > 0 else '') + elapsed_m|string + 'm' %}
  {% set daily_L   = states('sensor.tap_lhs_lower_lawn_green_daily')|float(-1) %}
  {% set monthly_L = states('sensor.tap_lhs_lower_lawn_green_monthly')|float(-1) %}
  {% set daily_disp   = '—' if daily_L < 0   else ((daily_L|round(0)|int|string   + ' L') if daily_L   >= 10 else (daily_L|round(1)|string   + ' L')) %}
  {% set monthly_disp = '—' if monthly_L < 0 else ((monthly_L|round(0)|int|string + ' L') if monthly_L >= 10 else (monthly_L|round(1)|string + ' L')) %}
  {% set timer_state = states('timer.tap_lhs_lower_lawn_green_timer') %}
  {% set timer_active = timer_state == 'active' %}
  {% set finishes_at = state_attr('timer.tap_lhs_lower_lawn_green_timer','finishes_at') %}
  {% set finish_ts = as_timestamp(finishes_at)|int(0) if (timer_active and finishes_at) else 0 %}
  {% set remaining_secs = [0, (finish_ts - now()|as_timestamp|int)]|max if timer_active else 0 %}
  {% set remaining_m = remaining_secs // 60 %}
  {% set remaining_s = remaining_secs % 60 %}
  {% set remaining_fmt = remaining_m|string + ':' + ('0' if remaining_s < 10 else '') + remaining_s|string %}
  <style>
  .zwv{padding:12px;font-family:var(--primary-font-family);color:var(--primary-text-color)}
  .zwv-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .zwv-ttl{font-size:.85em;font-weight:600;color:var(--secondary-text-color);letter-spacing:.05em;text-transform:uppercase}
  .zwv-hdr-r{display:flex;align-items:center;gap:8px}
  .zwv-poolbtn{cursor:pointer;font-size:1.1em;padding:2px 6px;border-radius:12px;background:rgba(120,120,120,.15);color:#666;border:1px solid rgba(120,120,120,.3);transition:all .3s;line-height:1.4}
  .zwv-poolbtn-on{background:rgba(33,150,243,.2);color:#64b5f6;border-color:#1565c0}
  .zwv-warn{cursor:pointer;font-size:1.4em;line-height:1;transition:all .3s}
  .zwv-won{color:#ff9800;filter:drop-shadow(0 0 5px #ff9800)}
  .zwv-woff{color:#444}
  .zwv-dw{display:flex;justify-content:center;margin-bottom:14px}
  .zwv-d{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#1e3a5f 0%,#0d1b2a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .5s,box-shadow .5s;border:3px solid #2d6a9f}
  .zwv-dopen{border-color:#4fc3f7}
  .zwv-dclosed{border-color:#ef5350}
  .zwv-dunavail{border-color:#555;opacity:.6}
  @keyframes zwv-fl{0%,100%{box-shadow:0 0 20px rgba(79,195,247,.25),inset 0 0 20px rgba(79,195,247,.06)}50%{box-shadow:0 0 40px rgba(79,195,247,.5),inset 0 0 30px rgba(79,195,247,.12)}}
  .zwv-flowing{animation:zwv-fl 2s ease-in-out infinite}
  .zwv-di{font-size:1.5em;margin-bottom:3px}
  .zwv-fv{font-size:2em;font-weight:700;line-height:1.1}
  .zwv-fvopen{color:#4fc3f7}
  .zwv-fvclosed{color:#ef5350}
  .zwv-fu{font-size:.58em;color:#78b8d4;margin-top:2px}
  .zwv-fs{font-size:.58em;letter-spacing:.1em;margin-top:6px;font-weight:700}
  .zwv-fson{color:#4fc3f7}
  .zwv-fsoff{color:#ef5350}
  .zwv-fsunavail{color:#666}
  .zwv-btns{display:flex;justify-content:center;gap:10px;margin-bottom:14px}
  .zwv-btn{padding:7px 22px;border-radius:20px;font-size:.78em;font-weight:700;cursor:pointer;border:1px solid transparent;letter-spacing:.05em;font-family:var(--primary-font-family)}
  .zwv-bopen{background:rgba(76,175,80,.15);color:#81c784;border-color:#388e3c}
  .zwv-bclose{background:rgba(239,83,80,.15);color:#ef9a9a;border-color:#c62828}
  .zwv-st{display:flex;justify-content:space-around;border-top:1px solid rgba(120,120,120,.2);padding-top:10px}
  .zwv-s{text-align:center;flex:1;cursor:pointer;padding:0 4px}
  .zwv-s+.zwv-s{border-left:1px solid rgba(120,120,120,.15)}
  .zwv-sv{display:block;font-size:1em;font-weight:600}
  .zwv-sl{display:block;font-size:.65em;color:var(--secondary-text-color);margin-top:2px}
  .zwv-tmr{border-top:1px solid rgba(120,120,120,.2);padding-top:10px;margin-top:10px}
  .zwv-tmr-hdr{font-size:.75em;font-weight:600;color:var(--secondary-text-color);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
  .zwv-tmr-presets{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
  .zwv-tmr-btn{padding:5px 10px;border-radius:14px;font-size:.78em;font-weight:700;cursor:pointer;background:rgba(120,120,120,.12);color:var(--secondary-text-color);border:1px solid rgba(120,120,120,.25);transition:background .2s,color .2s;font-family:var(--primary-font-family)}
  .zwv-tmr-cd-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
  .zwv-tmr-cd{font-size:2.4em;font-weight:700;color:#4fc3f7;font-variant-numeric:tabular-nums;letter-spacing:.02em}
  .zwv-tmr-cancel{padding:5px 18px;border-radius:14px;font-size:.75em;font-weight:700;cursor:pointer;background:rgba(239,83,80,.12);color:#ef9a9a;border:1px solid rgba(239,83,80,.3);font-family:var(--primary-font-family)}
  .zwv-pool{margin-top:12px;border-top:1px solid rgba(33,150,243,.3);padding-top:10px}
  .zwv-pool-hdr{font-size:.78em;font-weight:700;color:#64b5f6;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
  .zwv-pool-row{display:flex;justify-content:space-between;align-items:center;font-size:.82em;margin-bottom:6px;color:var(--secondary-text-color)}
  .zwv-pool-val{font-weight:600;color:var(--primary-text-color)}
  .zwv-pool-note{font-size:.72em;color:#555;margin-top:8px;font-style:italic}
  </style>
  <div class="zwv">
    <div class="zwv-hdr">
      <span class="zwv-ttl">💧 {{ name }}</span>
      <div class="zwv-hdr-r">
        <span id="zwv-poolbtn-tap_lhs_lower_lawn_green" class="zwv-poolbtn"
          title="Enable pool mode"
          onclick="zwvTogglePool_tap_lhs_lower_lawn_green()">🏊</span>
        <span class="zwv-warn {{ 'zwv-won' if unavailable else 'zwv-woff' }}"
          title="{{ 'Device unavailable' if unavailable else 'No warnings' }}"
          onclick="this.dispatchEvent(new CustomEvent('hass-more-info',{bubbles:true,composed:true,detail:{entityId:'switch.tap_lhs_lower_lawn_green'}}))">&#9888;</span>
      </div>
    </div>
    <div class="zwv-dw">
      <div class="zwv-d {{ dial_class }}"
        onclick="this.dispatchEvent(new CustomEvent('hass-more-info',{bubbles:true,composed:true,detail:{entityId:'sensor.tap_lhs_lower_lawn_green_flow'}}))">
        <div class="zwv-di">💧</div>
        <div class="zwv-fv {{ val_class }}">{{ flow_disp }}</div>
        <div class="zwv-fu">{{ 'L / min' if valve_open and not unavailable else '' }}</div>
        <div class="zwv-fs {{ lbl_class }}">{{ flow_lbl }}</div>
      </div>
    </div>
    <div class="zwv-btns">
      <span class="zwv-btn zwv-bopen"
        onclick="(function(){var h=document.querySelector('home-assistant');if(h&&h.hass)h.hass.callService('switch','turn_on',{entity_id:'switch.tap_lhs_lower_lawn_green'});})()">
        ▶ OPEN
      </span>
      <span class="zwv-btn zwv-bclose"
        onclick="(function(){var h=document.querySelector('home-assistant');if(h&&h.hass)h.hass.callService('switch','turn_off',{entity_id:'switch.tap_lhs_lower_lawn_green'});})()">
        ■ CLOSE
      </span>
    </div>
    <div class="zwv-st">
      <div class="zwv-s"
        onclick="this.dispatchEvent(new CustomEvent('hass-more-info',{bubbles:true,composed:true,detail:{entityId:'sensor.tap_lhs_lower_lawn_green_flow'}}))">
        <span class="zwv-sv">{{ flow_lmin if not unavailable else '—' }}</span>
        <span class="zwv-sl">Flow (L / min)</span>
      </div>
      <div class="zwv-s"
        onclick="this.dispatchEvent(new CustomEvent('hass-more-info',{bubbles:true,composed:true,detail:{entityId:'sensor.tap_lhs_lower_lawn_green_daily'}}))">
        <span class="zwv-sv">{{ daily_disp }}</span>
        <span class="zwv-sl">Today</span>
      </div>
      <div class="zwv-s"
        onclick="this.dispatchEvent(new CustomEvent('hass-more-info',{bubbles:true,composed:true,detail:{entityId:'sensor.tap_lhs_lower_lawn_green_monthly'}}))">
        <span class="zwv-sv">{{ monthly_disp }}</span>
        <span class="zwv-sl">This month</span>
      </div>
    </div>
    <div class="zwv-tmr">
      <div class="zwv-tmr-hdr">⏱ Timer</div>
      <div id="zwv-tmr-idle-tap_lhs_lower_lawn_green" {{ 'style="display:none"' if timer_active else '' }}>
        <div class="zwv-tmr-presets">
          <span class="zwv-tmr-btn" onclick="(function(){var h=document.querySelector('home-assistant');if(h&&h.hass){h.hass.callService('switch','turn_on',{entity_id:'switch.tap_lhs_lower_lawn_green'});h.hass.callService('timer','start',{entity_id:'timer.tap_lhs_lower_lawn_green_timer',duration:'00:00:10'});}})()">10s</span>
          <span class="zwv-tmr-btn" onclick="(function(){var h=document.querySelector('home-assistant');if(h&&h.hass){h.hass.callService('switch','turn_on',{entity_id:'switch.tap_lhs_lower_lawn_green'});h.hass.callService('timer','start',{entity_id:'timer.tap_lhs_lower_lawn_green_timer',duration:'00:05:00'});}})()">5m</span>
          <span class="zwv-tmr-btn" onclick="(function(){var h=document.querySelector('home-assistant');if(h&&h.hass){h.hass.callService('switch','turn_on',{entity_id:'switch.tap_lhs_lower_lawn_green'});h.hass.callService('timer','start',{entity_id:'timer.tap_lhs_lower_lawn_green_timer',duration:'00:10:00'});}})()">10m</span>
          <span class="zwv-tmr-btn" onclick="(function(){var h=document.querySelector('home-assistant');if(h&&h.hass){h.hass.callService('switch','turn_on',{entity_id:'switch.tap_lhs_lower_lawn_green'});h.hass.callService('timer','start',{entity_id:'timer.tap_lhs_lower_lawn_green_timer',duration:'00:15:00'});}})()">15m</span>
          <span class="zwv-tmr-btn" onclick="(function(){var h=document.querySelector('home-assistant');if(h&&h.hass){h.hass.callService('switch','turn_on',{entity_id:'switch.tap_lhs_lower_lawn_green'});h.hass.callService('timer','start',{entity_id:'timer.tap_lhs_lower_lawn_green_timer',duration:'00:20:00'});}})()">20m</span>
          <span class="zwv-tmr-btn" onclick="(function(){var h=document.querySelector('home-assistant');if(h&&h.hass){h.hass.callService('switch','turn_on',{entity_id:'switch.tap_lhs_lower_lawn_green'});h.hass.callService('timer','start',{entity_id:'timer.tap_lhs_lower_lawn_green_timer',duration:'00:25:00'});}})()">25m</span>
          <span class="zwv-tmr-btn" onclick="(function(){var h=document.querySelector('home-assistant');if(h&&h.hass){h.hass.callService('switch','turn_on',{entity_id:'switch.tap_lhs_lower_lawn_green'});h.hass.callService('timer','start',{entity_id:'timer.tap_lhs_lower_lawn_green_timer',duration:'00:30:00'});}})()">30m</span>
        </div>
      </div>
      <div id="zwv-tmr-active-tap_lhs_lower_lawn_green" {{ '' if timer_active else 'style="display:none"' }}>
        <div class="zwv-tmr-cd-wrap">
          <div class="zwv-tmr-cd" id="zwv-cd-tap_lhs_lower_lawn_green">{{ remaining_fmt }}</div>
          <span class="zwv-tmr-cancel" onclick="(function(){var h=document.querySelector('home-assistant');if(h&&h.hass){h.hass.callService('timer','cancel',{entity_id:'timer.tap_lhs_lower_lawn_green_timer'});h.hass.callService('switch','turn_off',{entity_id:'switch.tap_lhs_lower_lawn_green'});}})()">✕ Cancel &amp; close valve</span>
        </div>
      </div>
    </div>
    <div id="zwv-pool-tap_lhs_lower_lawn_green" class="zwv-pool" style="display:none">
      <div class="zwv-pool-hdr">🏊 Pool fill mode</div>
      <div class="zwv-pool-row">
        <span>Valve open for</span>
        <span class="zwv-pool-val" id="zwv-elapsed-tap_lhs_lower_lawn_green">{{ elapsed_fmt if valve_open else '—' }}</span>
      </div>
      <div class="zwv-pool-row">
        <span>Today's usage</span>
        <span class="zwv-pool-val">{{ daily_disp }}</span>
      </div>
      <div class="zwv-pool-row">
        <span>Volume limit</span>
        <span class="zwv-pool-val">— (v1.0.0)</span>
      </div>
      <div class="zwv-pool-note">Volume-based safety cutoff available in v1.0.0</div>
    </div>
  </div>
  <script>
  (function(){
    var prefix='tap_lhs_lower_lawn_green';
    var poolKey='zwv_pool_'+prefix;
    var lastChangedTs={{ last_changed_ts }};
    var valveOpen={{ 'true' if valve_open else 'false' }};
    var finishTs={{ finish_ts }};
    var timerActive={{ 'true' if timer_active else 'false' }};
    function elapsed(){
      if(!valveOpen)return '—';
      var s=Math.floor(Date.now()/1000-lastChangedTs);
      var h=Math.floor(s/3600);var m=Math.floor((s%3600)/60);
      return (h>0?h+'h ':'') + m+'m';
    }
    function updateElapsed(){
      var el=document.getElementById('zwv-elapsed-'+prefix);
      if(el)el.textContent=elapsed();
    }
    function applyPool(){
      var active=localStorage.getItem(poolKey)==='true';
      var section=document.getElementById('zwv-pool-'+prefix);
      var btn=document.getElementById('zwv-poolbtn-'+prefix);
      if(section)section.style.display=active?'block':'none';
      if(btn){
        btn.title=active?'Pool mode active — click to hide':'Enable pool mode';
        btn.classList.toggle('zwv-poolbtn-on',active);
      }
      if(active)updateElapsed();
    }
    window['zwvTogglePool_'+prefix]=function(){
      localStorage.setItem(poolKey,localStorage.getItem(poolKey)!=='true');
      applyPool();
    };
    function getRemaining(){
      if(!timerActive)return null;
      var s=Math.max(0,Math.floor(finishTs-Date.now()/1000));
      var m=Math.floor(s/60);var sec=s%60;
      return m+':'+(sec<10?'0':'')+sec;
    }
    function updateCountdown(){
      var cd=document.getElementById('zwv-cd-'+prefix);
      var r=getRemaining();
      if(cd&&r!==null)cd.textContent=r;
    }
    applyPool();
    setInterval(updateElapsed,30000);
    if(timerActive)setInterval(updateCountdown,1000);
  })();
  </script>
